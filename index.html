
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Biodata Murid SDN Pulo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#eef4f5;margin:0}
.header{margin:18px auto;width:94%;padding:22px;border-radius:28px;background:linear-gradient(135deg,#0ea5a4,#2d9fb0,#c89d42);color:#fff;text-align:center}
.tabs{display:flex;gap:8px;width:94%;margin:auto;flex-wrap:wrap}
.tab{padding:12px 18px;border:0;border-radius:14px;background:#d9e5e5;cursor:pointer}
.tab.active{background:#0ea5a4;color:#fff}
.card{width:94%;margin:16px auto;background:#fff;padding:18px;border-radius:24px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
.hidden{display:none}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
input,select,button{padding:10px;border-radius:12px;border:1px solid #ccc}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.stat{padding:18px;border-radius:24px;color:#fff;box-shadow:0 10px 22px rgba(0,0,0,.15);transition:.25s}
.stat:hover{transform:translateY(-4px)}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd;font-size:13px}
thead{background:#d1d5db}
@media print {.header,.tabs,.controls,#infografis,.no-print{display:none !important;}.card{box-shadow:none}}
</style>
</head>
<body>
<div class="header"><h1>BIODATA MURID SEKOLAH DASAR</h1></div>
<div class="tabs" id="tabs"></div>

<div id="infografis" class="card">
<div class="controls">
<select id="mode">
<option value="kelas">Total per Kelas</option>
<option value="jk">Jenis Kelamin per Kelas</option>
</select>
<div id="loginWrap" style="display:none;gap:8px;flex-wrap:wrap">
<input id="u" placeholder="Username Admin">
<input id="p" type="password" placeholder="Password">
</div>
<button id="loginBtn" onclick="toggleLogin()">🔐 Login Admin</button>
</div>
<canvas id="chart" height="110"></canvas>
<div id="cards" class="grid" style="margin-top:18px"></div>
</div>

<div id="biodata" class="card hidden">
<h3>Biodata Murid</h3>
<div style="overflow:auto"><table>
<thead><tr><th>Nama Lengkap</th><th>Tempat Lahir</th><th>Tanggal Lahir</th><th>NIK</th><th>NISN</th><th>NIS</th><th>Jenis Kelamin</th><th>Kelas</th></tr></thead>
<tbody id="tb"></tbody></table></div>
</div>

<div id="update" class="card hidden">
<iframe src="https://tally.so/r/xXR9ay?transparentBackground=1" style="width:100%;height:80vh;border:0;border-radius:20px"></iframe>
</div>

<div id="cetak" class="card hidden">
<h3 class="no-print">Cetak Data</h3>
<div class="controls">
<select id="kelasCetak"><option value="">Semua Kelas</option></select>
<button onclick="filterPrint()">🔎 Cari</button>
<button onclick="printData()">🖨️ Cetak</button>
</div>
<div id="printArea"></div>
</div>

<script>
const URL='https://docs.google.com/spreadsheets/d/18MjAN6iR4RGbE_G1q3MBvgekGHpylMlcBQh-xOS3E9Y/gviz/tq?tqx=out:json';
let data=[],chart,admin=false,printFiltered=[];

function renderTabs(){
 tabs.innerHTML='';
 (admin?['Infografis','Biodata','Update','Cetak']:['Infografis']).forEach((x,i)=>{
 const b=document.createElement('button');
 b.className='tab'+(i===0?' active':''); b.textContent=x;
 b.onclick=()=>show(x.toLowerCase()); tabs.appendChild(b);});
}
function show(id){
 ['infografis','biodata','update','cetak'].forEach(x=>document.getElementById(x).classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
 [...document.querySelectorAll('.tab')].find(x=>x.textContent.toLowerCase()==id)?.classList.add('active');
}
function toggleLogin(){
 const w=document.getElementById('loginWrap');
 if(w.style.display==='none'||!w.style.display){w.style.display='flex';document.getElementById('u').focus();return;}
 login();
}
function login(){
 if(u.value==='20315045'&&p.value==='sdnpulo'){admin=true;renderTabs();alert('Login berhasil')}
 else alert('Username/password salah');
}
document.addEventListener('keydown',e=>{
 if(e.key==='Enter' && document.getElementById('loginWrap').style.display==='flex'){ login(); }
});
async function load(){
 const t=await (await fetch(URL)).text();
 const j=JSON.parse(t.substring(47).slice(0,-2));
 data=j.table.rows.map(r=>{const c=r.c||[];return{
 nama:c[0]?.v||'',tempat:c[1]?.v||'',tgl:c[2]?.f||c[2]?.v||'',nik:c[3]?.v||'',nisn:c[4]?.v||'',nis:c[5]?.v||'',jk:c[6]?.v||'',kelas:c[7]?.v||''
 }});
 tb.innerHTML=data.map(x=>`<tr><td>${x.nama}</td><td>${x.tempat}</td><td>${x.tgl}</td><td>${x.nik}</td><td>${x.nisn}</td><td>${x.nis}</td><td>${x.jk}</td><td>${x.kelas}</td></tr>`).join('');
 [...new Set(data.map(x=>x.kelas))].sort().forEach(k=>kelasCetak.innerHTML+=`<option>${k}</option>`);
 renderChart();
}
function renderChart(){
 const map={}; data.forEach(d=>{if(!map[d.kelas])map[d.kelas]={L:0,P:0,T:0};
 (d.jk||'').toLowerCase().includes('l')?map[d.kelas].L++:map[d.kelas].P++; map[d.kelas].T++;});
 const labels=Object.keys(map).sort();
 const max=Math.max(...labels.map(k=>map[k].T),1);
 cards.innerHTML=labels.map((k,i)=>`<div class="stat" style="background:linear-gradient(135deg,hsl(${i*55},75%,55%),#1f2937)">
 <div style="font-size:14px">KELAS ${k}</div>
 <div style="font-size:32px;font-weight:bold">👥 ${map[k].T} Siswa</div>
 <div>👦 Laki-laki: <b>${map[k].L}</b></div>
 <div>👧 Perempuan: <b>${map[k].P}</b></div>
 </div>`).join('');
 const ds = mode.value==='jk' ?
 [{label:'Laki-laki',data:labels.map(k=>map[k].L),backgroundColor:'#3b82f6'},
  {label:'Perempuan',data:labels.map(k=>map[k].P),backgroundColor:'#ec4899'}]
 : [{label:'Jumlah Siswa',data:labels.map(k=>map[k].T),
 backgroundColor:labels.map((_,i)=>`hsl(${i*55},75%,55%)`)}];
 if(chart) chart.destroy();
 chart=new Chart(document.getElementById('chart'),{
 type:'bar',
 data:{labels,datasets:ds},
 options:{
 animation:{duration:1500},
 plugins:{legend:{position:'top'}},
 scales:{y:{beginAtZero:true,ticks:{stepSize:1,precision:0},suggestedMax:max+1}}
 }});
}
mode.onchange=renderChart;
function filterPrint(){
 printFiltered=kelasCetak.value?data.filter(x=>x.kelas==kelasCetak.value):[...data];
 printArea.innerHTML='<div style="margin:8px 0;font-weight:bold">Data ditemukan: '+printFiltered.length+' siswa</div><table><thead><tr><th>Nama Lengkap</th><th>Tempat Lahir</th><th>Tanggal Lahir</th><th>NIK</th><th>NISN</th><th>NIS</th><th>Jenis Kelamin</th><th>Kelas</th></tr></thead><tbody>'+
 printFiltered.map(x=>`<tr><td>${x.nama}</td><td>${x.tempat}</td><td>${x.tgl}</td><td>${x.nik}</td><td>${x.nisn}</td><td>${x.nis}</td><td>${x.jk}</td><td>${x.kelas}</td></tr>`).join('')+'</tbody></table>';
}

function printData(){
 const arr=printFiltered.length?printFiltered:data;
 const tanggal = new Date().toLocaleDateString('id-ID');

 printArea.innerHTML = `
 <div style="display:flex;align-items:center;gap:2px;border-bottom:4px double #000;padding-bottom:10px;margin-bottom:14px">
 <img src="logo-blora.png" style="width:115px;height:115px;object-fit:contain">
   <div style="flex:1;text-align:center;line-height:1.15">
      <div style="font-size:17px;font-weight:bold">PEMERINTAH KABUPATEN BLORA</div>
      <div style="font-size:17px;font-weight:bold">DINAS PENDIDIKAN</div>
      <div style="font-size:17px;font-weight:bold">KORWIL BIDIK KECAMATAN KEDUNGTUBAN</div>
      <div style="font-size:26px;font-weight:900">SDN PULO</div>
      <div style="font-size:13px">Alamat : Jl. Pertamina KM. 0,5 Desa Pulo, Kec. Kedungtuban, Kab. Blora 58381</div>
      <div style="font-size:13px">📧 : sdn.pulo@gmail.com</div>
   </div>
 </div>

 <div style="display:flex;justify-content:space-between;margin:12px 0">
   <div style="font-size:14px;font-weight:bold">REKAP BIODATA MURID</div>
   <div>Tanggal Cetak: ${tanggal}</div>
 </div>

 <table style="width:100%;border-collapse:collapse" border="1" cellspacing="0" cellpadding="6">
 <thead>
 <tr>
 <th>Nama Lengkap</th><th>Tempat Lahir</th><th>Tanggal Lahir</th>
 <th>NIK</th><th>NISN</th><th>NIS</th><th>Jenis Kelamin</th><th>Kelas</th>
 </tr>
 </thead>
 <tbody>
 ${arr.map(x=>`
 <tr>
 <td>${x.nama}</td>
 <td>${x.tempat}</td>
 <td>${x.tgl}</td>
 <td>${x.nik}</td>
 <td>${x.nisn}</td>
 <td>${x.nis}</td>
 <td>${x.jk}</td>
 <td>${x.kelas}</td>
 </tr>`).join('')}
 </tbody>
 </table>

 <div style="display:flex;justify-content:space-between;margin-top:50px">
   <div style="text-align:center">
      <div>Mengetahui,</div>
      <div><b>Kepala Sekolah</b></div>
      <div style="height:80px"></div>
      <div style="text-decoration:underline;font-weight:bold">(.............................)</div>
      <div>NIP. .............................</div>
   </div>

   <div style="text-align:center">
      <div>Blora, ${tanggal}</div>
      <div><b>Operator Sekolah</b></div>
      <div style="height:80px"></div>
      <div style="text-decoration:underline;font-weight:bold">(.............................)</div>
      <div>NIP. .............................</div>
   </div>
 </div>
 `;
 window.print();
}

renderTabs(); load();
</script>
</body>
</html>
